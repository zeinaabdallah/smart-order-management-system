name: Claude Code Assistant

on:
  # Trigger on PR events (opened, updated, review requested)
  pull_request:
    types: [opened, synchronize, reopened]

  # Trigger when someone comments @claude on a PR or issue
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

  # Trigger when an issue is assigned to Claude
  issues:
    types: [assigned]

# Prevent multiple runs on the same PR from piling up
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    # Only run if:
    # - It's a PR event (auto-review)
    # - Someone mentioned @claude in a comment
    # - An issue was assigned to claude
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          
          # Use Sonnet for CI tasks (much cheaper than Opus, fast enough for reviews)
          model: claude-sonnet-4-6

          # Limit turns to prevent runaway API costs
          # 10 turns is enough for most reviews; increase if Claude needs more for complex PRs
          max_turns: 10

          # Custom prompt for PR reviews
          # This only applies when the workflow is triggered by a PR event (not @claude mentions)
          prompt: |
            Review this PR for:
            1. Spring Boot and Java best practices
            2. Missing error handling or edge cases
            3. Potential concurrency issues (especially in Kafka consumers and inventory operations)
            4. Missing or insufficient tests
            5. API design consistency (REST conventions, DTO patterns)
            6. Security concerns (auth, input validation, SQL injection)

            Be specific — reference exact files and line numbers.
            Rate each finding as CRITICAL, HIGH, MEDIUM, or LOW.
            Keep the review concise and actionable.

          # Tools Claude is allowed to use
          allowed_tools: "Read,Write,Bash(git diff:*),Bash(git log:*),Bash(mvn:*),Bash(grep:*),Bash(find:*)"
